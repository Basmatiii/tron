# project.yaml — schema (B0)
# Per-project config record. Written by the seeder (B1) by detecting + asking.
# Lives at <agents>/tron/project.yaml. Tracked + PR'd. Re-read every session start.
# Supersedes the prose project.example.md; field meanings carry over verbatim.
#
# Annotations:  # REQUIRED | # OPTIONAL | <placeholder>  | a | b  (enum)

# ── Pointers (the heart of the config) ──────────────────────────────
pointers:
  agents: <path>            # REQUIRED. Where worker agent defs live; TRON installs here too. e.g. meta/agents/
  specs:  <path>            # REQUIRED. Where host spec files live (local MD).

# ── Agents available (roles found at pointers.agents) ───────────────
# Seeder enumerates files present; never creates them. workflow.yaml may
# reference only roles listed here (lint L11).
agents:                     # REQUIRED, >=1 entry
  - role: <name>            # e.g. engineer | architect | reviewer | <custom>
    file: <path>            # e.g. meta/agents/engineer.md

# ── Pipeline mode ────────────────────────────────────────────
pipeline:
  mode: host | internal     # REQUIRED
  path: <path>              # REQUIRED iff mode == host (the host doc; must meet contracts §7)
  # mode: internal -> pipeline lives at <agents>/tron/pipeline.md (gitignored, see contracts §8)

# ── Detected repo facts (auto; only matter to workflows that use them) ──
repo:                       # OPTIONAL block; present when a git workflow is used
  name: <str>
  root: <path>
  main_branch: <str>        # e.g. main
  remote: <org/repo>        # OPTIONAL
  worktrees_dir: <path>     # default .worktrees/
  logs_dir: <path>

# ── Conventions (spawn scripts read these instead of hardcoding) ────
conventions:                # OPTIONAL; defaults applied if absent
  branch_naming: <pattern>  # e.g. "{type}/{slug}-YYMMDD"
  block_id_pattern: <pattern>
  worker_id_pattern: <pattern>
  commit_convention: <str>
  pr_title_rule: <str>

# ── Notifications + heartbeat (followed without asking; contracts §0) ──
notifications:
  telegram: off | on        # REQUIRED. on => heartbeat on (cron polls TG)
  cron: auto | on | off     # REQUIRED. auto = on whenever telegram on
# effective heartbeat = telegram==on OR cron==on

# ── Protected branches (only for committing workflows; workflow R8) ──
protected_branches:         # OPTIONAL
  - repo: <repo-name>
    branch: <branch>

# ── Free-form operator context (any may be empty) ──────────────────
operator_only_tasks: []     # tasks TRON escalates, never dispatches (DNS, dashboards, billing…)
local_validation_gaps: []   # work engineers do but can't fully verify (mobile, paid 3rd-party UAT…)
ci: {}                      # runner / duration / stall-threshold override
deploy: {}                  # trigger / target / preview URL / what TRON watches past merge
notes: <str>                # OPTIONAL free text (monorepo boundaries, migration rules…)

# env keys are NOT here — they live in <agents>/tron/.env (gitignored), read by scripts only.
