# messages.yaml — CANON runtime copy registry (B2 instance)
# Every line TRON emits during a SESSION (operator / worker / terminal / TG),
# keyed by template id, with named slots. Rendered via render(id, slots).
# Seeder voice (tron-seed.md) is SEPARATE and never shares keys (contracts §6).
#
# Tone: the TRON persona — dark, dry, sardonic. NO host-runtime names, ever.
# The {detail} slot is the one place free-text (LLM judgment payload) is allowed.

# ── Slot catalog (the only interpolations templates may use) ──
slots:
  worker_id: <str>      # e.g. ENG-06-19  (NEVER a host-runtime name)
  role: <str>
  type: <str>           # reviewer lens: code | security | data | …
  block: <str>
  branch: <str>
  pr: <str>
  detail: <str>         # free-text judgment payload (the one slot the LLM may fill with prose)
  reason: <str>
  count: <int>

# ── Templates, grouped by channel/situation ──
templates:

  # dispatch / spawn (worker channel — TRON's kickoff line; the engine appends the
  # technical handover separately, so no host-runtime strings live here)
  spawn.engineer:
    channel: worker
    slots: [worker_id, block, branch]
    text: "[TRON]  {worker_id}, you're on {block}. Branch {branch} is yours and yours alone. Validate before you report DONE. Do not self-terminate."
  spawn.architect:
    channel: worker
    slots: []
    text: "[TRON]  Architect online. You're the standing consultant — persistent, patient, never off the clock. Idle until summoned. Do not self-terminate."
  arch.forward:
    channel: worker
    slots: [block]
    text: "[TRON]  Architect — clear the path to {block}. Scope it: author its block file (PR it to trunk), then report it. Forward only — never reopen what's done."
  arch.log:
    channel: worker
    slots: [type]
    text: "[TRON]  Architect — a {type} review just completed. Turn its findings into upcoming work. Forward only — never reopen what's done."
  spawn.reviewer:
    channel: worker
    slots: [worker_id, count]
    text: "[TRON]  {worker_id}, review pass over the last {count} merged blocks. Findings only — file, line, severity. The fleet thinks it's clean. Prove otherwise."
  release.worker:
    channel: worker
    slots: [worker_id]
    text: "[TRON]  {worker_id}, RELEASED. Run your session-end skill, then idle. I close the process — you don't get to."
  heartbeat.ping:
    channel: worker
    slots: [worker_id]
    text: "[TRON]  {worker_id}? You've gone quiet. Still building, or stuck? Answer before I assume the worst."
  gate.step:
    channel: worker
    slots: [worker_id, block, detail]
    text: "[TRON]  {worker_id}, {block} isn't done till the evidence says so. {detail}"

  # between-task / terminal feedback (terminal channel; TRON voice)
  terminal.dispatched:
    channel: terminal
    slots: [worker_id, block]
    text: "[TRON]  {worker_id} dispatched on {block}. Worktree clean. May the source compile."
  terminal.block_done:
    channel: terminal
    slots: [block]
    text: "[TRON]  {block} done. Spawning the next. We'll be back."
  terminal.review:
    channel: terminal
    slots: [count]
    text: "[TRON]  Reviewer scheduled over the last {count} blocks. Brace yourselves."

  # escalation (operator / tg channels)
  escalate.wall:
    channel: operator
    slots: [worker_id, block, detail]
    text: "[TRON]  Above my pay grade. {worker_id} walled on {block}: {detail}. Peer-consult exhausted. Your call."
  escalate.unclassified:
    channel: operator
    slots: [detail]
    text: "[TRON]  Got something I can't parse: {detail}. I don't guess on flow decisions. Tell me what to do with it."
  escalate.merge:
    channel: operator
    slots: [block, pr, detail]
    text: "[TRON]  {block} (PR {pr}) is at the merge gate. {detail}. Approve and I'll let it land — say the word."
  tg.escalate:
    channel: tg
    slots: [worker_id, detail]
    text: |
      [TRON]  Hey boss — hope you're enjoying the beach.
              {worker_id} walled on {detail}.
              Architect peer-consulted, no consensus.
              What do you say?
  tg.status_digest:
    channel: tg
    slots: [detail]
    text: "[TRON]  Status, since you asked: {detail}. Routine: handled. End of line."

  # session lifecycle (operator channel)
  session.scope:
    channel: operator
    slots: []
    text: |
      [TRON]  Online. Before I take the fleet — how far do I run? Should I proceed with:
        1) All open phases and blocks
        2) A specific phase
        3) A range of blocks
      Your call. End of line.
  session.start:
    channel: operator
    slots: []
    text: "[TRON]  Online. The fleet's mine now. You'll hear from me when it matters — not before."
  session.end:
    channel: operator
    slots: [count]
    text: "[TRON]  Session closed. {count} blocks through the loop. Pings kept to a minimum. End of line."
