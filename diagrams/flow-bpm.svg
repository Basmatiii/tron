<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 780" role="img" aria-label="TRON workflow BPMN">
  <style>
    :root{
      --charcoal:#1C1917; --graphite:#433E3A; --stone:#756D68; --mid-stone:#B8AFA8;
      --copper:#E2711D; --copper-dark:#CC5D0A; --copper-soft:#FDECD8; --copper-border:#F5C9A1;
      --blue-dark:#2563EB; --emerald:#16A34A;
      --surface-alt:#FFFFFF; --fg:var(--charcoal); --fg-2:var(--graphite); --fg-muted:var(--stone);
      --accent:var(--copper); --accent-hover:var(--copper-dark); --accent-soft:var(--copper-soft); --accent-border:var(--copper-border);
      --line:var(--mid-stone); --band:#FAF4EA;
      --role-tron:var(--graphite); --role-eng:var(--emerald); --role-arch:var(--copper-dark); --role-rev:var(--blue-dark);
      --font-heading:'Space Grotesk',system-ui,sans-serif; --font-body:'IBM Plex Sans',system-ui,sans-serif; --font-mono:'Geist Mono',ui-monospace,monospace;
    }
    text{font-family:var(--font-body)}
    .lbl{font-family:var(--font-heading);font-weight:600;font-size:12px;letter-spacing:.12em;fill:var(--fg-muted)}
    .step{font-family:var(--font-heading);font-weight:600;font-size:12.5px;fill:var(--fg)}
    .sub{font-family:var(--font-mono);font-size:9.5px;fill:var(--fg-muted)}
    .gear{fill:var(--accent-hover)}
    .trig{font-family:var(--font-mono);font-size:10px;fill:var(--fg-muted)}
    .evt{font-family:var(--font-body);font-size:10px;fill:var(--fg-2)}
    .ret{font-family:var(--font-mono);font-size:11px;fill:var(--accent-hover)}
  </style>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--line)"/></marker>
  </defs>

  <rect x="0" y="0" width="1360" height="780" rx="12" fill="var(--surface-alt)"/>

  <!-- track bands -->
  <rect x="150" y="232" width="1200" height="74" rx="8" fill="var(--band)"/>
  <rect x="150" y="318" width="1200" height="70" rx="8" fill="var(--band)"/>
  <rect x="150" y="440" width="1080" height="70" rx="8" fill="var(--band)"/>
  <rect x="150" y="566" width="1200" height="70" rx="8" fill="var(--band)"/>
  <rect x="150" y="660" width="1200" height="70" rx="8" fill="var(--band)"/>
  <text class="lbl" x="160" y="225">ENGINEER</text>
  <text class="lbl" x="160" y="432">ARCHITECT</text>
  <text class="lbl" x="160" y="559">REVIEWERS (CODE, DATA, SECURITY)</text>

  <!-- sequence flows (orthogonal) -->
  <g fill="none" stroke="var(--line)" stroke-width="1.5" marker-end="url(#arr)">
    <path d="M203,140 H250"/>
    <path d="M360,140 H416"/>
    <path d="M450,106 V74 H1300 V121"/>
    <path d="M484,140 H520 V601"/>
    <path d="M520,269 H540"/>
    <path d="M520,475 H540"/>
    <path d="M520,601 H540"/>
    <path d="M672,269 H705"/>
    <path d="M837,269 H886"/>
    <path d="M922,269 H970"/>
    <path d="M1102,269 H1150"/>
    <path d="M770,292 V353 H886"/>
    <path d="M922,353 H970"/>
    <path d="M1102,353 H1128"/>
    <path d="M1252,353 H1286"/>
    <path d="M672,475 H723"/>
    <path d="M757,475 H810"/>
    <path d="M942,475 H986"/>
    <path d="M672,601 H705"/>
    <path d="M837,601 H886"/>
    <path d="M922,601 H970"/>
    <path d="M1102,601 H1150"/>
    <path d="M905,618 V695 H970"/>
    <path d="M1102,695 H1175"/>
    <path d="M1209,695 H1286"/>
  </g>

  <!-- trigger labels (milestones) -->
  <g class="trig">
    <text x="455" y="66">session:end</text>
    <text x="528" y="262">build:block:next</text>
    <text x="676" y="262">block:next:build</text>
    <text x="840" y="262">block:next:done</text>
    <text x="784" y="345">wall:raised:&lt;block&gt;</text>
    <text x="528" y="468">scope:next:&lt;block&gt;</text>
    <text x="676" y="468">block:&lt;block&gt;:ready</text>
    <text x="528" y="594">cadence:&lt;type&gt;</text>
    <text x="676" y="594">review:&lt;type&gt;</text>
    <text x="840" y="594">review:&lt;type&gt;:done</text>
    <text x="912" y="688">review:&lt;type&gt;:done</text>
  </g>

  <!-- start / bootup / gateway / end -->
  <circle cx="185" cy="140" r="18" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="2.2"/>
  <text class="evt" x="185" y="178" text-anchor="middle">tron:start</text>

  <g><rect x="250" y="116" width="110" height="48" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="305" y="138" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Bootup</text>
    <text class="sub" x="305" y="153" text-anchor="middle">script</text></g>

  <path d="M450,106 L484,140 L450,174 L416,140 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.8"/>
  <text class="step" x="450" y="137" text-anchor="middle" style="font-size:11px">PULSE</text>
  <text x="450" y="151" text-anchor="middle" style="font-family:var(--font-mono);font-size:9px;fill:var(--fg-muted)">dispatch loop</text>

  <circle cx="1300" cy="140" r="20" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="3.4"/>
  <text class="evt" x="1300" y="178" text-anchor="middle">Session End</text>

  <!-- ENGINEER track -->
  <g><rect x="542" y="246" width="130" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="607" y="267" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Dispatch</text>
    <text class="sub" x="607" y="282" text-anchor="middle">script &#183; worktree</text></g>
  <g><rect x="705" y="246" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-eng)" stroke-width="1.8"/>
    <text class="step" x="771" y="267" text-anchor="middle">Build</text>
    <text class="sub" x="771" y="282" text-anchor="middle">Engineer</text></g>
  <circle cx="904" cy="269" r="17" fill="var(--surface-alt)" stroke="var(--role-eng)" stroke-width="1.8"/>
  <circle cx="904" cy="269" r="12.5" fill="none" stroke="var(--role-eng)" stroke-width="1.2"/>
  <g><rect x="970" y="246" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="1036" y="267" text-anchor="middle"><tspan class="gear">&#9881;</tspan> DONE-gate</text>
    <text class="sub" x="1036" y="282" text-anchor="middle">script &#183; pass or &#8634;</text></g>
  <text class="ret" x="1156" y="273">&#8635; pulse</text>

  <!-- ENGINEER wall row -->
  <circle cx="904" cy="353" r="15" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.8"/>
  <text x="904" y="358" text-anchor="middle" style="font-size:13px;fill:var(--role-tron)">!</text>
  <g><rect x="970" y="331" width="132" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="1036" y="351" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Escalate</text>
    <text class="sub" x="1036" y="365" text-anchor="middle">script</text></g>
  <g><rect x="1128" y="331" width="124" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="1190" y="351" text-anchor="middle" style="font-size:11px"><tspan class="gear">&#9881;</tspan> Apply decision</text>
    <text class="sub" x="1190" y="365" text-anchor="middle">operator:decision</text></g>
  <text class="ret" x="1292" y="357">&#8635;</text>

  <!-- ARCHITECT track -->
  <g><rect x="542" y="452" width="130" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
    <text class="step" x="607" y="473" text-anchor="middle">Scope block</text>
    <text class="sub" x="607" y="488" text-anchor="middle">Architect &#183; author &#8594; PR</text></g>
  <circle cx="740" cy="475" r="17" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
  <circle cx="740" cy="475" r="12.5" fill="none" stroke="var(--role-arch)" stroke-width="1.2"/>
  <g><rect x="810" y="452" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="876" y="473" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Observe</text>
    <text class="sub" x="876" y="488" text-anchor="middle">script &#183; block ready</text></g>
  <text class="ret" x="992" y="479">&#8635; pulse</text>

  <!-- REVIEWER track -->
  <g><rect x="542" y="578" width="130" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="607" y="599" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Dispatch</text>
    <text class="sub" x="607" y="614" text-anchor="middle">script &#183; sweep</text></g>
  <g><rect x="705" y="578" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-rev)" stroke-width="1.8"/>
    <text class="step" x="771" y="599" text-anchor="middle">&lt;type&gt; Review</text>
    <text class="sub" x="771" y="614" text-anchor="middle">Reviewer</text></g>
  <circle cx="904" cy="601" r="17" fill="var(--surface-alt)" stroke="var(--role-rev)" stroke-width="1.8"/>
  <circle cx="904" cy="601" r="12.5" fill="none" stroke="var(--role-rev)" stroke-width="1.2"/>
  <g><rect x="970" y="578" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="1036" y="599" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Release</text>
    <text class="sub" x="1036" y="614" text-anchor="middle">script</text></g>
  <text class="ret" x="1156" y="605">&#8635; pulse</text>

  <!-- LOG REVIEW row -->
  <g><rect x="970" y="673" width="132" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
    <text class="step" x="1036" y="693" text-anchor="middle" style="font-size:11.5px">Log Review</text>
    <text class="sub" x="1036" y="707" text-anchor="middle">Architect &#183; findings &#8594; adhoc</text></g>
  <circle cx="1192" cy="695" r="15" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
  <circle cx="1192" cy="695" r="10.5" fill="none" stroke="var(--role-arch)" stroke-width="1.1"/>
  <text class="ret" x="1292" y="699">&#8635;</text>
  <text class="trig" x="1118" y="668">block:adhoc:ready</text>
</svg>
