# routing.yaml — CANON. Two things the engine needs that are NOT the workflow itself:
#   1. the TRIGGER GRAMMAR — the closed vocabulary every trigger must satisfy.
#   2. the INBOUND tag map — how a raw worker/operator message becomes a trigger.
# The behaviour (trigger -> step -> on-complete) lives in workflow.yaml (the explicit
# event table). The old "primitive library" is gone: the table states every edge directly.
# Ships with TRON, copied verbatim at seed. The seeder never writes it.
# Shapes locked by contracts/schema/routing.schema.yaml; checked by blueprint-lint.

# ── Trigger grammar (closed) ───────────────────────────────────────
grammar:
  notation: "lowercase, colon-delimited segments, no spaces"
  forms:                       # every trigger matches exactly one form
    - "domain:object"          # imperative dispatch     e.g. build:block:next
    - "subject:event"          # completion              e.g. review:next, session:end
    - "subject:object:event"   # qualified completion    e.g. block:next:done, review:<type>:done
  subjects: [tron, build, block, review, cadence, session, worker, operator, wall]
  events:   [start, build, done, clear, stalled, next, end, adhoc, raised, decision]
  params:
    "<type>":  "reviewer type: code | security | data | …  (never the reserved literal 'next')"
    "<block>": "a pipeline block ID, e.g. NN-NN-NN"
  reserved:
    next: "the next block to dispatch (literal segment; never a <type>)"
  wildcard: "*"                # fallback trigger (the SCRIPTS catch-all row)
  alternatives: "|"            # alternatives within one cell
  terminals: ["end", "-"]      # end = session over ; - = no trigger
  control: "pulse"             # the dispatch-loop signal; NOT a table-listener trigger
  match: "most-specific-wins"  # literal > <type>/<block> > *

# ── Inbound message classification (closed tag enum -> trigger | side | tick) ──
# classify_message returns exactly ONE tag. Each maps to:
#   trigger: <t>  -> emit that workflow trigger (the FSM advances per workflow.yaml)
#   side: <h>     -> a global handler; the FSM does not advance
#   tick: true    -> run one bounded tick (the sweep)
# Closed enum + total coverage (blueprint-lint).
tags:
  # worker-origin
  worker.done:              { trigger: "block:next:done" }
  worker.wall:              { trigger: "wall:raised:<block>" }
  worker.review_done:       { trigger: "review:<type>:done" }
  worker.progress:          { side: none }
  worker.question_peer:     { side: observe }            # peer consult; logged, no advance
  worker.question_tron:     { side: answer_from_context }
  # architect-origin (the persistent, forward-only consultant's reports)
  architect.cleared:        { trigger: "block:<block>:clear" }   # forward-review done -> block file authored on trunk
  architect.logged:         { trigger: "block:adhoc:clear" }     # log-review done -> adhoc block files authored
  # operator-origin
  operator.decision:        { trigger: "operator:decision:<block>" }
  operator.status_query:    { side: reply_digest }
  operator.workflow_change: { side: edit_self }
  operator.directive:       { side: best_effort }
  # system (engine-produced, not from classify_message)
  sweep.tick:               { tick: true }
  worker.stalled:           { trigger: "worker:stalled" }   # engine liveness side-system
  worker.dead:              { trigger: "worker:stalled" }   # recover handles both
  # reserved
  unclassified:             { trigger: "*" }                # -> SCRIPTS catch-all (may wall)

# ── Invalid-output policy (a judgment tool that won't validate) ─────
invalid_output:
  max_retries: 2                         # read by the engine (judge retry budget)
  on_exhaustion: "*"                     # -> unclassified -> SCRIPTS catch-all (may wall via assess_wall)

# ── Judgment tools (the ONLY LLM calls; schema-in / schema-out) ────
# Output is always a tag + structured slots, never free prose to the flow.
tools:
  classify_message: { in: [text, sender], out: [tag, slots, confidence] }
  assess_wall:      { in: [situation, block_ctx, project_operator_only],    out: [wall, kind, rationale] }
  # tiering: classify_message -> cheap ; assess_wall -> strong
  # NOT judgment tools (by design): review verdicts (review is a milestone),
  # findings-triage (-> architect log-review skill), stall detection (-> engine liveness).
