# workflow-state.yaml — live FSM state (runtime; gitignored)
# TRON's per-session memory: workers, counters, cadence, the architect queue, and
# the pipeline mirror. Written atomically every tick (tmp + mv). Do NOT hand-edit —
# the engine manages it. Seeded from this template; the engine fills it via setdefault,
# so missing keys are created on first run.

session:
  started_at: null            # set at bootup; cleared at session-end
  ended_at: null

# ── FSM context (passed to judgment tools as block_ctx) ──
fsm: {}

# ── Active workers (source of truth for "what's running now") ──
# list of {id, role, session_id, shortid, spawned_at, status, block, [rtype], [current_job]}
# status in: spawning | working | idle (architect) | released
active_workers: []

# ── Counters (stall counts, etc.) ──
counters: {}

# ── Reviewer cadence (PULL): <type> -> completed blocks since its last review ──
cadence: {}

# ── Architect FIFO queue: pending {kind: forward|log, block, [type]} jobs ──
architect_queue: []

# ── Live config (this session) ──
live_config:
  worker_count: null          # set at session start (engineers + reviewers; architect excluded)

# ── Pipeline mirror (normalized) ──
# list of {order, id, owner, status, kind, [notes]}
pipeline: []

# ── Last sweep ──
last_sweep:
  at: null
  sweeps_this_session: 0
